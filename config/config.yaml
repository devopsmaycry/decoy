version: "1.2"

listeners:
  - port: "2222"
    type: ssh
  - port: 2525
    type: tcp
    service: smtp

service:
  smtpBanner: "Testing for localhost"

ssh:
  logUsername: true
  logPassword: true
  sshShowedVersion: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"

https:
  serverCertificate: "./dev/server.crt"
  serverCertificateKey: "./dev/server.key"

syslog:
  enabled: false
  server: "127.0.0.1"
  port: "514"
  cliEnabled: true
