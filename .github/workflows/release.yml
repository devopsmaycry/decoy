name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    # Only run when a release/* branch is merged (not just closed)
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')

    runs-on: ubuntu-latest

    permissions:
      contents: write   # create tags + GitHub Release
      packages: write   # push to ghcr.io

    steps:
      # ── Extract version from branch name ────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"
          # Ensure version starts with "v"
          [[ "$VERSION" != v* ]] && VERSION="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Released version: ${VERSION}"

      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Create and push Git tag ──────────────────────────────────────────────
      - name: Create Git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      # ── Build pre-compiled binaries ──────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-w -s" -o decoy-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-w -s" -o decoy-linux-arm64 .

      - name: Generate checksums
        run: |
          sha256sum decoy-linux-amd64 decoy-linux-arm64 > checksums.txt
          cat checksums.txt

      # ── Generate SBOM with cdxgen (CycloneDX JSON) ──────────────────────────
      - name: Set up Node.js (for cdxgen)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install cdxgen
        run: npm install -g @cyclonedx/cdxgen

      - name: Generate SBOM
        run: |
          cdxgen \
            --type go \
            --output sbom.cdx.json \
            --format json \
            .

      # ── Docker: build & push to ghcr.io ─────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=decoy
            org.opencontainers.image.description=A lightweight honeypot service
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            decoy-linux-amd64
            decoy-linux-arm64
            checksums.txt
            sbom.cdx.json
